version: "3.9"

services:
  stasharr-api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: dev
    env_file:
      - dev.env
    volumes:
      - .:/app
      - /app/vendor
      - ${DOWNLOADS_PATH:-./dev-data/downloads}:/downloads
      - ${MEDIA_PATH:-./dev-data/media}:/media
    ports:
      - "8080:8080"
      - "2345:2345"

  stasharr-ui:
    command: npm run dev -- --host 0.0.0.0
    build:
      context: ./web
      dockerfile: ../docker/ui.Dockerfile
      target: dev
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
