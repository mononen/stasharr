version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stasharr
      POSTGRES_USER: stasharr
      POSTGRES_PASSWORD: stasharr
    ports:
      - "5432:5432"
    volumes:
      - stasharr-dev-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stasharr"]
      interval: 5s
      timeout: 5s
      retries: 5

  stasharr-api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
      target: dev
    env_file:
      - dev.env
    volumes:
      - .:/app
      - /app/vendor
      - ${DOWNLOADS_PATH:-./dev-data/downloads}:/downloads
      - ${MEDIA_PATH:-./dev-data/media}:/media
    ports:
      - "8080:8080"
      - "2345:2345"
    depends_on:
      postgres:
        condition: service_healthy

  stasharr-ui:
    command: pnpm run dev -- --host 0.0.0.0
    build:
      context: .
      dockerfile: docker/ui.Dockerfile
      target: dev
    volumes:
      - ./web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://stasharr-api:8080

volumes:
  stasharr-dev-pgdata:
